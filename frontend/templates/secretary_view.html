{% include 'header.html' %}

<!-- Main Dashboard Canvas -->
<main class="flex-1 p-4 md:p-10 overflow-y-auto bg-background">
    <div class="max-w-[1440px] mx-auto flex flex-col gap-6">
        <!-- Central Prominent Search Bar -->
        <div class="w-full bg-white border border-[#1A1A1A]/10 p-2 flex items-center focus-within:border-[#0057FF] transition-all">
            <span class="material-symbols-outlined px-4 text-zinc-400">search</span>
            <input class="w-full bg-transparent border-none focus:ring-0 text-xl font-bold text-on-surface placeholder:text-zinc-300 outline-none h-12 md:h-16"
                placeholder="Search records by ID, Serial Number, or Client Name..." type="text" />
            <button class="hidden md:flex bg-primary text-white px-8 h-full font-bold uppercase hover:bg-secondary transition-colors items-center justify-center whitespace-nowrap mr-1">
                Global Search
            </button>
        </div>

        <!-- Bento Grid Layout -->
        <div class="grid grid-cols-12 gap-6">
            <!-- Customer Records Table -->
            <div class="col-span-12 xl:col-span-8 bg-white border border-[#1A1A1A]/10 flex flex-col overflow-hidden">
                <div class="p-6 border-b border-[#1A1A1A]/10 flex justify-between items-center bg-zinc-50">
                    <h2 class="text-xl font-black uppercase tracking-tighter text-on-surface">Active Registrations</h2>
                    <span class="font-mono text-[10px] bg-zinc-900 text-white px-3 py-1">TOTAL: 1,204</span>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse min-w-[600px]">
                        <thead>
                            <tr class="border-b-2 border-zinc-100 bg-zinc-50/50">
                                <th class="p-4 text-[10px] font-bold text-zinc-400 uppercase tracking-widest">Ticket ID</th>
                                <th class="p-4 text-[10px] font-bold text-zinc-400 uppercase tracking-widest">Client</th>
                                <th class="p-4 text-[10px] font-bold text-zinc-400 uppercase tracking-widest">Device</th>
                                <th class="p-4 text-[10px] font-bold text-zinc-400 uppercase tracking-widest">Status</th>
                                <th class="p-4 text-[10px] font-bold text-zinc-400 uppercase tracking-widest text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody class="text-xs">
                            <tr class="border-b border-zinc-50 hover:bg-zinc-50 transition-colors">
                                <td class="p-4 font-mono">#TR-8921</td>
                                <td class="p-4 font-bold">Acme Corp</td>
                                <td class="p-4 text-zinc-500">ThinkPad T14s</td>
                                <td class="p-4">
                                    <span class="bg-blue-50 text-blue-600 px-2 py-1 font-bold uppercase text-[8px] border border-blue-100">Diagnosing</span>
                                </td>
                                <td class="p-4 text-right">
                                    <button class="text-primary hover:underline font-bold uppercase">View</button>
                                </td>
                            </tr>
                            <!-- ... other rows ... -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- New Entry Form -->
            <div class="col-span-12 xl:col-span-4 bg-white border border-[#1A1A1A]/10 flex flex-col">
                <div class="p-6 border-b border-[#1A1A1A]/10 bg-zinc-50">
                    <h2 class="text-xl font-black uppercase tracking-tighter text-on-surface">New Entry Ticket</h2>
                </div>
                <form class="p-6 flex flex-col gap-6 flex-1">
                    <div class="flex flex-col gap-1">
                        <label class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest">Device Brand</label>
                        <input class="bg-transparent border-0 border-b border-zinc-100 p-2 text-sm focus:ring-0 focus:border-primary transition-all outline-none"
                            placeholder="e.g. Lenovo, Apple" type="text" />
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest">Model Identifier</label>
                        <input class="bg-transparent border-0 border-b border-zinc-100 p-2 text-sm focus:ring-0 focus:border-primary transition-all outline-none"
                            placeholder="e.g. ThinkPad T14 Gen 3" type="text" />
                    </div>
                    <div class="flex flex-col gap-1 flex-1">
                        <label class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest">Reported Issue</label>
                        <textarea class="bg-zinc-50 border border-zinc-100 p-3 text-sm focus:ring-0 focus:border-primary transition-all outline-none resize-none mt-2"
                            placeholder="Describe the client's problem concisely..." rows="4"></textarea>
                    </div>
                    <button class="w-full bg-primary text-white py-4 font-bold uppercase hover:bg-secondary transition-colors flex items-center justify-center gap-2" type="submit">
                        <span class="material-symbols-outlined text-sm">add_circle</span>
                        Register Intake
                    </button>
                </form>
            </div>
        </div>
    </div>
</main>

</div> <!-- Cierre main-content -->

</body>
</html>
