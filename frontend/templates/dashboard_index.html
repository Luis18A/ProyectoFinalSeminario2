{% include 'header.html' %}

<!-- Dashboard Canvas -->
<main class="flex-1 p-container-margin">
    <div class="mb-lg">
        <h2 class="font-headline-lg text-headline-lg text-primary">Overview</h2>
    </div>
    <!-- Bento Grid -->
    <div class="grid grid-cols-12 gap-grid-gutter">
        <!-- Key Metrics row -->
        <div class="col-span-12 md:col-span-4 bg-surface-container-lowest border border-outline-variant p-lg flex flex-col justify-between">
            <div class="flex justify-between items-start mb-xl">
                <span class="font-label-bold text-label-bold text-on-surface-variant uppercase">Active Tickets</span>
                <span class="material-symbols-outlined text-secondary">confirmation_number</span>
            </div>
            <div>
                <div class="font-headline-xl text-headline-xl text-primary">142</div>
                <div class="flex items-center gap-2 mt-xs text-on-tertiary-container">
                    <span class="material-symbols-outlined text-sm">arrow_upward</span>
                    <span class="font-label-mono text-label-mono">12% from yesterday</span>
                </div>
            </div>
        </div>
        <!-- Pending Repairs -->
        <div class="col-span-12 md:col-span-4 bg-surface-container-lowest border border-outline-variant p-lg flex flex-col justify-between">
            <div class="flex justify-between items-start mb-xl">
                <span class="font-label-bold text-label-bold text-on-surface-variant uppercase">Pending Repairs</span>
                <span class="material-symbols-outlined text-error">build</span>
            </div>
            <div>
                <div class="font-headline-xl text-headline-xl text-primary">38</div>
                <div class="flex items-center gap-2 mt-xs text-error">
                    <span class="material-symbols-outlined text-sm">warning</span>
                    <span class="font-label-mono text-label-mono">5 critical status</span>
                </div>
            </div>
        </div>
        <!-- Today's Revenue -->
        <div class="col-span-12 md:col-span-4 bg-surface-container-lowest border border-outline-variant p-lg flex flex-col justify-between">
            <div class="flex justify-between items-start mb-xl">
                <span class="font-label-bold text-label-bold text-on-surface-variant uppercase">Today's Revenue</span>
                <span class="material-symbols-outlined text-on-surface-variant">payments</span>
            </div>
            <div>
                <div class="font-headline-xl text-headline-xl text-primary">$4,250</div>
                <div class="flex items-center gap-2 mt-xs text-on-tertiary-container">
                    <span class="material-symbols-outlined text-sm">arrow_upward</span>
                    <span class="font-label-mono text-label-mono">Target met</span>
                </div>
            </div>
        </div>
        <!-- Quick Actions & System Status -->
        <div class="col-span-12 lg:col-span-8 bg-surface-container-lowest border border-outline-variant p-lg flex flex-col">
            <h3 class="font-label-bold text-label-bold text-on-surface-variant uppercase mb-md">Quick Actions</h3>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-md flex-1">
                <button class="bg-primary text-on-primary p-lg flex flex-col items-center justify-center gap-sm hover:bg-surface-tint transition-colors">
                    <span class="material-symbols-outlined text-[32px]">add_circle</span>
                    <span class="font-label-mono text-label-mono uppercase">Create Ticket</span>
                </button>
                <button class="border border-outline-variant text-primary p-lg flex flex-col items-center justify-center gap-sm hover:bg-surface transition-colors">
                    <span class="material-symbols-outlined text-[32px]">inventory_2</span>
                    <span class="font-label-mono text-label-mono uppercase">Inventory</span>
                </button>
                <button class="border border-outline-variant text-primary p-lg flex flex-col items-center justify-center gap-sm hover:bg-surface transition-colors">
                    <span class="material-symbols-outlined text-[32px]">bar_chart</span>
                    <span class="font-label-mono text-label-mono uppercase">Reports</span>
                </button>
            </div>
        </div>
        <!-- System Health -->
        <div class="col-span-12 lg:col-span-4 bg-surface-container-lowest border border-outline-variant p-lg">
            <h3 class="font-label-bold text-label-bold text-on-surface-variant uppercase mb-md">System Health</h3>
            <div class="space-y-md mt-lg">
                <div>
                    <div class="flex justify-between items-center mb-xs">
                        <span class="font-label-mono text-label-mono text-primary">Main Server CPU</span>
                        <span class="font-label-mono text-label-mono text-primary">45%</span>
                    </div>
                    <div class="h-[2px] bg-surface-variant w-full">
                        <div class="h-full bg-secondary w-[45%]"></div>
                    </div>
                </div>
                <div>
                    <div class="flex justify-between items-center mb-xs">
                        <span class="font-label-mono text-label-mono text-primary">Database Storage</span>
                        <span class="font-label-mono text-label-mono text-error">88%</span>
                    </div>
                    <div class="h-[2px] bg-surface-variant w-full">
                        <div class="h-full bg-error w-[88%]"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

</div> <!-- Cierre main-content -->

</body>
</html>
