<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ITSM Platform - Authentication</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&amp;family=Space+Grotesk:wght@500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-surface": "#1a1c1d",
                    "on-secondary-container": "#e4e7ff",
                    "surface-bright": "#f9f9fb",
                    "surface-container-lowest": "#ffffff",
                    "primary": "#000000",
                    "on-primary": "#ffffff",
                    "on-secondary-fixed-variant": "#003ab2",
                    "primary-fixed": "#e5e2e1",
                    "surface-container-high": "#e8e8ea",
                    "surface": "#f9f9fb",
                    "error-container": "#ffdad6",
                    "surface-tint": "#5f5e5e",
                    "on-primary-fixed": "#1c1b1b",
                    "on-error-container": "#93000a",
                    "inverse-primary": "#c8c6c5",
                    "on-tertiary-fixed": "#002108",
                    "tertiary-container": "#002108",
                    "on-tertiary": "#ffffff",
                    "surface-variant": "#e2e2e4",
                    "secondary-fixed-dim": "#b6c4ff",
                    "on-tertiary-fixed-variant": "#00531e",
                    "tertiary": "#000000",
                    "on-error": "#ffffff",
                    "surface-dim": "#d9dadc",
                    "outline-variant": "#c4c7c7",
                    "surface-container-highest": "#e2e2e4",
                    "background": "#f9f9fb",
                    "surface-container": "#eeeef0",
                    "on-secondary-fixed": "#001550",
                    "secondary": "#0042c7",
                    "error": "#ba1a1a",
                    "secondary-fixed": "#dce1ff",
                    "primary-container": "#1c1b1b",
                    "tertiary-fixed": "#69ff87",
                    "on-tertiary-container": "#00983d",
                    "tertiary-fixed-dim": "#3ce36a",
                    "on-primary-fixed-variant": "#474746",
                    "on-secondary": "#ffffff",
                    "secondary-container": "#0056fd",
                    "outline": "#747878",
                    "inverse-surface": "#2f3132",
                    "inverse-on-surface": "#f0f0f2",
                    "surface-container-low": "#f3f3f5",
                    "on-surface-variant": "#444748",
                    "primary-fixed-dim": "#c8c6c5",
                    "on-primary-container": "#858383",
                    "on-background": "#1a1c1d"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "grid-gutter": "16px",
                    "lg": "24px",
                    "xs": "4px",
                    "sm": "8px",
                    "xl": "32px",
                    "container-margin": "40px",
                    "md": "16px",
                    "unit": "4px"
            },
            "fontFamily": {
                    "body-md": ["Inter"],
                    "headline-lg": ["Space Grotesk"],
                    "headline-xl": ["Space Grotesk"],
                    "headline-md": ["Space Grotesk"],
                    "body-sm": ["Inter"],
                    "body-lg": ["Inter"],
                    "label-bold": ["Inter"],
                    "label-mono": ["Space Grotesk"]
            },
            "fontSize": {
                    "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "headline-xl": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-md": ["24px", {"lineHeight": "1.2", "fontWeight": "600"}],
                    "body-sm": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "label-bold": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "700"}],
                    "label-mono": ["13px", {"lineHeight": "1", "letterSpacing": "0.02em", "fontWeight": "500"}]
            }
          }
        }
      }
    </script>
<style>
        /* Specific overrides to enforce Swiss Style rigid inputs */
        input:focus { outline: none; box-shadow: none !important; }
    </style>
</head>
<body class="bg-background text-on-surface flex items-center justify-center min-h-screen p-container-margin antialiased">
<!-- Minimalist Bento Card Container -->
<main class="w-full max-w-[440px] bg-surface-container-lowest border border-outline-variant p-container-margin relative flex flex-col shadow-[0px_8px_0px_rgba(26,28,29,0.05)]">
<!-- Strict geometric anchor -->
<div class="absolute top-0 left-0 w-full h-xs bg-primary"></div>
<!-- Header -->
<header class="mb-xl">
<span class="font-label-mono text-label-mono uppercase text-on-surface-variant tracking-widest block mb-sm">System Terminal</span>
<h1 class="font-headline-xl text-headline-xl text-primary">Identify</h1>
</header>
<!-- Authentication Form -->
<form class="flex flex-col gap-lg flex-grow">
<!-- Operator ID Input -->
<div class="flex flex-col relative group">
<label class="font-label-bold text-label-bold text-primary uppercase tracking-widest mb-sm" for="operator-id">Operator ID</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant py-sm px-0 focus:ring-0 focus:border-b-2 focus:border-secondary transition-colors font-body-lg text-body-lg text-primary placeholder:text-outline-variant placeholder:font-body-md" id="operator-id" name="operator-id" placeholder="Enter identification string" required="" type="text"/>
</div>
<!-- Passcode Input -->
<div class="flex flex-col relative group">
<div class="flex justify-between items-end mb-sm">
<label class="font-label-bold text-label-bold text-primary uppercase tracking-widest" for="passcode">Passcode</label>
<a class="font-label-mono text-label-mono text-secondary hover:text-on-secondary-fixed-variant transition-colors uppercase tracking-widest" href="#">Recover</a>
</div>
<div class="relative flex items-center">
<input class="w-full bg-transparent border-0 border-b border-outline-variant py-sm px-0 pr-xl focus:ring-0 focus:border-b-2 focus:border-secondary transition-colors font-body-lg text-body-lg text-primary placeholder:text-outline-variant placeholder:font-body-md tracking-[0.2em]" id="passcode" name="passcode" placeholder="••••••••" required="" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-0 bottom-sm text-outline hover:text-primary transition-colors flex items-center justify-center focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Action Area -->
<div class="mt-md">
<button class="w-full bg-primary text-on-primary py-md px-lg font-label-bold text-label-bold uppercase tracking-widest hover:bg-inverse-surface transition-colors rounded-none flex justify-between items-center group" type="submit">
<span>Authenticate</span>
<span class="material-symbols-outlined transform group-hover:translate-x-1 transition-transform" style="font-variation-settings: 'FILL' 1;">arrow_forward</span>
</button>
</div>
</form>
<!-- Technical Footer -->
<footer class="mt-xl pt-md border-t border-outline-variant flex justify-between items-center">
<div class="flex items-center gap-xs text-outline">
<span class="material-symbols-outlined text-[14px]">lock</span>
<span class="font-label-mono text-label-mono uppercase tracking-widest text-[10px]">Encrypted</span>
</div>
<span class="font-label-mono text-label-mono text-outline uppercase tracking-widest text-[10px]">Build 4.9.2</span>
</footer>
</main>
</body></html>
